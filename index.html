<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot SLAM Lab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="controls">
        <p class="eyebrow">Autonomous Systems</p>
        <h1>Robot SLAM Lab</h1>
        <p class="desc">Simulate a mobile robot mapping unknown space with lidar-like scans and probabilistic occupancy updates.</p>

        <div class="card">
          <h2>Robot Controls</h2>
          <div class="row">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
          </div>
          <div class="row">
            <button id="resetBtn">Reset World</button>
            <button id="randomBtn">Random Obstacles</button>
          </div>
        </div>

        <div class="card">
          <h2>Navigation</h2>
          <label>Speed
            <input id="speedInput" type="range" min="0.6" max="3.4" step="0.1" value="1.8" />
            <span id="speedValue">1.8</span>
          </label>
          <label>Scan Rays
            <input id="rayInput" type="range" min="12" max="72" step="2" value="34" />
            <span id="rayValue">34</span>
          </label>
        </div>

        <div class="card stats">
          <h2>Mapping Metrics</h2>
          <p>Coverage: <strong id="coverageText">0%</strong></p>
          <p>Known Obstacles: <strong id="obstacleText">0</strong></p>
          <p>Path Length: <strong id="pathText">0</strong></p>
        </div>
      </section>

      <section class="view-wrap">
        <canvas id="slam" width="980" height="620"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
